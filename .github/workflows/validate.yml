name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install jq and shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y jq shellcheck

      - name: Validate skill layout and frontmatter
        run: bash scripts/validate-skills.sh

      - name: Lint shell scripts
        run: |
          find skills -name '*.sh' -print0 | xargs -0 --no-run-if-empty shellcheck
          shellcheck scripts/*.sh
